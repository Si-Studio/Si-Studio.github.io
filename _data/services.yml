services:
  - name: "Projekt koncepcyjny"
    description: "Wizualizacja i plan aranżacji wnętrza dopasowany do Twojego stylu życia. Obejmuje inspiracje, moodboard oraz wstępny układ funkcjonalny."
  - name: "Projekt wykonawczy"
    description: "Kompletna dokumentacja techniczna gotowa do realizacji — rzuty, przekroje, detale, zestawienia materiałów i wyposażenia."
  - name: "Nadzór autorski"
    description: "Kontrola jakości wykonania na każdym etapie realizacji. Wizyty na budowie, koordynacja ekip i pilnowanie zgodności z projektem."

process:
  - step: 1
    label: "Konsultacja"
    description: "Poznajemy Twoje potrzeby, styl życia i oczekiwania wobec przestrzeni."
  - step: 2
    label: "Koncepcja"
    description: "Tworzymy wstępną wizję wnętrza — moodboard, układ i pierwsze wizualizacje."
  - step: 3
    label: "Projekt"
    description: "Opracowujemy szczegółową dokumentację techniczną i dobieramy materiały."
  - step: 4
    label: "Realizacja"
    description: "Nadzorujemy prace budowlane, dbając o zgodność z projektem."
  - step: 5
    label: "Odbiór"
    description: "Wspólnie sprawdzamy efekt końcowy i wprowadzamy ostatnie poprawki."
