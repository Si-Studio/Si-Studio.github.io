- name: "Justyna N."
  project: "dom jednorodzinny bliźniak"
  quote: "Pani Iga pełen profesjonalizm. Pomogła nam w aranżacji naszego wymarzonego domu. Od każdej listewki po meble. Doradzała, pomagała w wyborze - co będzie funkcjonale, a co się nie sprawdzi. Bardzo polecamy."

- name: "Anna L."
  project: "apartament w Hiszpanii"
  quote: "Projekt domu w Hiszpanii-zrealizowany sprawnie, zgodnie z oczekiwaniami i w hiszpańskim klimacie. Polecam!"

- name: "Magdalena I."
  project: "łazienki w kamienicy"
  quote: "Współpraca z Igą to wielka przyjemność. Projekt dopasowany do potrzeb, do budżetu i super kontakt."

- name: "Beata C."
  project: "elewacja domu"
  quote: "Zamówiłam u Pani Igi wykonanie projektu elewacji. Jestem bardzo zadowolona. Współpraca przebiegała bardzo profesjonalnie. Pani Iga wzięła pod uwagę mój budżet i oczekiwania. Fachowo doradziła nie tylko przy projekcie, ale również przy wyborze produktów do wykonania elewacji. Dostałam też wizualizacje. Z całego serca polecam współpracę."
