<!-- Page Loader — Si Studio -->
<div class="loader" id="page-loader" aria-hidden="true">
  <style>
    .loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FAF7F2;
    }

    .loader__content {
      opacity: 0;
      transform: translateY(20px);
      animation: loaderFadeSlide 300ms cubic-bezier(0.16, 1, 0.3, 1) 100ms forwards;
    }

    .loader__logo {
      display: block;
      width: 120px;
      height: 40px;
    }

    .loader--hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 600ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .loader--hidden .loader__content {
      animation: none;
    }

    .loader--instant {
      display: none !important;
    }

    @keyframes loaderFadeSlide {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .loader__content {
        opacity: 1;
        transform: none;
        animation: none;
      }

      .loader--hidden {
        transition: none;
      }
    }
  </style>
  <div class="loader__content">
    <img src="/images/logo/logo.svg" alt="" class="loader__logo" width="120" height="40">
  </div>
</div>
