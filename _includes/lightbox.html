<!-- Lightbox — full-screen image viewer with keyboard + touch navigation -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Powiększenie zdjęcia" hidden>
  <div class="lightbox__backdrop"></div>
  <button class="lightbox__close" aria-label="Zamknij">&times;</button>
  <button class="lightbox__prev" aria-label="Poprzednie zdjęcie">&#8249;</button>
  <button class="lightbox__next" aria-label="Następne zdjęcie">&#8250;</button>
  <div class="lightbox__content">
    <img class="lightbox__image" src="" alt="">
  </div>
</div>
