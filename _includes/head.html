<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{{ page.title | default: site.title }} — Si Studio</title>
<meta name="description" content="{{ page.description | default: site.description }}">

<!-- Google Fonts: Preconnect + Stylesheet -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@400;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Open Graph -->
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:image" content="{{ page.image | default: '/images/logo/logo.svg' | absolute_url }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:type" content="website">

<!-- Canonical URL -->
<link rel="canonical" href="{{ page.url | absolute_url }}">

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/images/logo/logo-180x180.png">

<!-- Hero image preload for LCP optimization -->
{% if page.url == '/' or page.permalink == '/' %}
<link rel="preload" as="image" href="/images/projects/eleganckie_mieszkanie_dla_pary_w_szczecinie/glowne_Zamaria.jpg" fetchpriority="high">
{% endif %}

<!-- Stylesheet -->
<link rel="stylesheet" href="/assets/css/main.css">
