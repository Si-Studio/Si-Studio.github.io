# Site metadata
title: "Si Studio"
description: "Projektowanie wnętrz z pasją i precyzją — studio projektowania wnętrz w Szczecinie"
url: "https://si-studio.github.io"
lang: "pl"
telephone: "+48 XXX XXX XXX"

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-paginate

# Collections
collections_dir: 'collections'

collections:
  pages:
    output: true
    permalink: /:title/
  projects:
    output: true
    permalink: /project/:slug/
  posts:
    output: true
    permalink: /blog/:slug/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      type: pages
      path: _pages/index.html
    values:
      permalink: /
  - scope:
      type: projects
    values:
      layout: project
  - scope:
      type: posts
    values:
      layout: post

# Pagination
paginate: 12
paginate_path: "/blog/page:num/"

# Exclude build artifacts and dev tooling
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - scripts/
  - sistudio_content/
  - node_modules/
  - .kiro/
  - components.html
  - component-library/
  - spec/
  - lib/
